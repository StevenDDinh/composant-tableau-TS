<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Exemple Tabulator</title>

  <!-- CSS Tabulator depuis le CDN -->
  <link href="./node_modules/tabulator-tables/dist/css/tabulator.min.css" rel="stylesheet">

  <!-- JS Tabulator depuis le CDN -->
  <script src="./node_modules/tabulator-tables/dist/js/tabulator.min.js"></script>
</head>
<body>

  <div id="example-table"></div>

  <script>
    // Exemple d'intégration avec Tabulator
    // fetch("https://dummyjson.com/products")
    // .then(res => res.json()) // Permet de convertir les données récupérées en json
    // .then(data => {
    //     var table = new Tabulator("#example-table", {
    //         data: data.products, // données injectées manuellement
    //         autoColumns:true
    //     });
    //     console.log("Affichage des données récupérées");
    //     table.on("tableBuilt",()=>{
    //       console.log(table.getData());
    //     })
    // });
    
    var table = new Tabulator("#example-table", {
        ajaxURL: "https://dummyjson.com/users", // API de données fictives
        layout:"fitDataFill",
        ajaxResponse: function(url, params, response) {
            return response.users; // Adapter selon la structure de l'API
        },
        autoColumns: true // Organise les colonnes automatiquement
    });
    table.on("tableBuilt",()=>{
      console.log("Affichage des données récupérées");
      console.log(table.getAjaxUrl());
    })
    
  </script>

</body>
</html>
